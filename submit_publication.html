<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>刊物征集投稿 - 全国Galgame同好会地图</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: "Noto Sans SC", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 680px; margin: 0 auto; }
        .top-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
            flex-wrap: wrap;
            gap: 12px;
        }
        .top-bar h1 {
            color: white;
            font-size: 22px;
            font-weight: 700;
        }
        .top-bar .back-link {
            color: rgba(255,255,255,0.85);
            text-decoration: none;
            font-size: 14px;
            padding: 8px 18px;
            border-radius: 40px;
            background: rgba(255,255,255,0.2);
            transition: background 0.2s;
        }
        .top-bar .back-link:hover { background: rgba(255,255,255,0.3); }
        .form-card {
            background: white;
            border-radius: 20px;
            padding: 32px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.12);
        }
        .form-card h2 {
            font-size: 18px;
            color: #333;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 2px solid #f0f0f0;
        }
        .form-group { margin-bottom: 20px; }
        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #555;
            margin-bottom: 6px;
        }
        .form-group label .required { color: #e74c3c; }
        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 12px 14px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 14px;
            font-family: inherit;
            transition: border-color 0.2s;
            outline: none;
        }
        .form-group input:focus,
        .form-group textarea:focus { border-color: #667eea; }
        .form-group textarea { resize: vertical; min-height: 80px; }
        .form-group .hint { font-size: 12px; color: #999; margin-top: 4px; }
        .image-upload-area {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        .image-upload-area img {
            width: 60px; height: 60px; border-radius: 10px; object-fit: cover;
            background: #f5f5f5; display: none;
        }
        .image-upload-area .upload-btn {
            padding: 8px 18px; border-radius: 40px; border: 2px solid #e0e0e0;
            background: white; cursor: pointer; font-size: 13px; transition: all 0.2s;
        }
        .image-upload-area .upload-btn:hover { border-color: #667eea; color: #667eea; }
        .image-upload-area .remove-btn {
            padding: 8px 18px; border-radius: 40px; border: 2px solid #ffcdd2;
            background: white; cursor: pointer; font-size: 13px; color: #e74c3c; display: none; transition: all 0.2s;
        }
        .image-upload-area .remove-btn:hover { background: #ffebee; }
        .image-upload-area .status-text { font-size: 12px; color: #999; }
        .submit-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 40px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
            margin-top: 8px;
        }
        .submit-btn:hover { opacity: 0.9; }
        .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .message {
            padding: 14px 18px;
            border-radius: 12px;
            margin-bottom: 20px;
            display: none;
            font-size: 14px;
        }
        .message.success { display: block; background: #e8f5e9; color: #2e7d32; border: 1px solid #a5d6a7; }
        .message.error { display: block; background: #ffebee; color: #c62828; border: 1px solid #ef9a9a; }
        @media (max-width: 640px) {
            .form-card { padding: 20px; }
            .top-bar h1 { font-size: 18px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="top-bar">
            <h1>📖 刊物征集投稿</h1>
            <a class="back-link" href="./index.html">← 返回首页</a>
        </div>

        <div id="message" class="message"></div>

        <div class="form-card">
            <h2>📝 填写刊物征集信息</h2>

            <div class="form-group">
                <label>同好会名称 <span class="required">*</span></label>
                <input type="text" id="clubName" placeholder="例：复旦大学九日九视觉小说同好会" />
            </div>

            <div class="form-group">
                <label>刊物名称 <span class="required">*</span></label>
                <input type="text" id="publicationName" placeholder="例：《旮之旯》" />
            </div>

            <div class="form-group">
                <label>投稿联系方式 <span class="required">*</span></label>
                <input type="text" id="submitContact" placeholder="QQ号、邮箱、Discord 账号等" />
                <div class="hint">用于投稿人联系，仅在刊物中展示</div>
            </div>

            <div class="form-group">
                <label>投稿链接</label>
                <input type="url" id="submitLink" placeholder="https://..." />
                <div class="hint">可选，如在线投稿表格或问卷链接</div>
            </div>

            <div class="form-group">
                <label>截止日期</label>
                <input type="date" id="deadline" />
            </div>

            <div class="form-group">
                <label>刊物介绍</label>
                <textarea id="description" placeholder="简要介绍刊物的主题、征稿要求等…" rows="4"></textarea>
            </div>

            <div class="form-group">
                <label>封面 / 素材图片</label>
                <div class="image-upload-area">
                    <img id="imagePreview" src="" alt="" />
                    <input type="file" id="imageInput" accept="image/jpeg,image/png,image/gif,image/webp" style="display:none;" />
                    <input type="hidden" id="imageUrl" value="" />
                    <button type="button" class="upload-btn" id="uploadBtn">📷 选择图片</button>
                    <button type="button" class="remove-btn" id="removeBtn">移除</button>
                    <span class="status-text" id="uploadStatus"></span>
                </div>
                <div class="hint">支持 JPEG、PNG、GIF、WebP，最大 2MB</div>
            </div>

            <button type="button" class="submit-btn" id="submitBtn">📤 提交刊物征集</button>
        </div>
    </div>

    <script>
    const API = './api/submit_publication.php';

    // 图片上传
    document.getElementById('uploadBtn').addEventListener('click', () => {
        document.getElementById('imageInput').click();
    });

    document.getElementById('imageInput').addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const fd = new FormData();
        fd.append('image', file);
        fd.append('id', 'pub_' + Date.now());
        const statusEl = document.getElementById('uploadStatus');
        statusEl.textContent = '上传中...';
        try {
            const r = await fetch('./api/club_avatar.php?scope=publication', { method: 'POST', body: fd });
            const j = await r.json();
            if (j.success) {
                document.getElementById('imagePreview').src = j.image_url;
                document.getElementById('imagePreview').style.display = '';
                document.getElementById('imageUrl').value = j.image_url;
                document.getElementById('removeBtn').style.display = '';
                statusEl.textContent = '✅ 上传成功';
            } else {
                statusEl.textContent = '❌ ' + (j.message || '上传失败');
            }
        } catch {
            statusEl.textContent = '❌ 网络错误';
        }
    });

    document.getElementById('removeBtn').addEventListener('click', () => {
        document.getElementById('imagePreview').src = '';
        document.getElementById('imagePreview').style.display = 'none';
        document.getElementById('imageUrl').value = '';
        document.getElementById('removeBtn').style.display = 'none';
        document.getElementById('uploadStatus').textContent = '已移除图片';
    });

    // 提交
    document.getElementById('submitBtn').addEventListener('click', async () => {
        const clubName = document.getElementById('clubName').value.trim();
        const publicationName = document.getElementById('publicationName').value.trim();
        const submitContact = document.getElementById('submitContact').value.trim();

        if (!clubName) { showMsg('请填写同好会名称', 'error'); return; }
        if (!publicationName) { showMsg('请填写刊物名称', 'error'); return; }
        if (!submitContact) { showMsg('请填写投稿联系方式', 'error'); return; }

        const data = {
            clubName,
            publicationName,
            submitContact,
            submitLink: document.getElementById('submitLink').value.trim(),
            deadline: document.getElementById('deadline').value,
            description: document.getElementById('description').value.trim(),
            image_url: document.getElementById('imageUrl').value
        };

        const btn = document.getElementById('submitBtn');
        btn.disabled = true;
        btn.textContent = '提交中...';

        try {
            const r = await fetch(API, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            const j = await r.json();
            if (j.success) {
                showMsg('✅ ' + j.message, 'success');
                document.getElementById('clubName').value = '';
                document.getElementById('publicationName').value = '';
                document.getElementById('submitContact').value = '';
                document.getElementById('submitLink').value = '';
                document.getElementById('deadline').value = '';
                document.getElementById('description').value = '';
                document.getElementById('imageUrl').value = '';
                document.getElementById('imagePreview').src = '';
                document.getElementById('imagePreview').style.display = 'none';
                document.getElementById('removeBtn').style.display = 'none';
                document.getElementById('uploadStatus').textContent = '';
            } else {
                showMsg('❌ ' + (j.message || '提交失败'), 'error');
            }
        } catch {
            showMsg('❌ 网络错误，请重试', 'error');
        }

        btn.disabled = false;
        btn.textContent = '📤 提交刊物征集';
    });

    function showMsg(text, type) {
        const el = document.getElementById('message');
        el.textContent = text;
        el.className = 'message ' + type;
        el.style.display = 'block';
        el.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }
    </script>
</body>
</html>
