<h2>🎨 站点实际配色版</h2>
<p class="subtitle">使用 CSS 变量中的实际颜色：--md-primary: #e74c3c, 背景 #fff7fa</p>

<div class="mockup" style="max-width: 400px; margin: 0 auto;">

  <!-- 卡片 -->
  <div style="border-radius:20px; overflow:hidden; box-shadow:0 2px 20px rgba(231,76,60,0.12); background:white;">
    <!-- 顶部装饰条 -->
    <div style="height:5px; background:linear-gradient(90deg, #ffcdc9, #e74c3c, #ffcdc9);"></div>

    <!-- 头部 -->
    <div style="padding:20px 20px 16px; display:flex; gap:16px; align-items:center;">
      <!-- 头像 -->
      <div style="width:76px; height:76px; border-radius:50%; overflow:hidden; border:3px solid #e74c3c; flex-shrink:0; box-shadow:0 4px 16px rgba(231,76,60,0.12);">
        <div style="width:100%; height:100%; background:#e74c3c; display:flex; align-items:center; justify-content:center; color:white; font-size:26px; font-weight:700;">U</div>
      </div>
      <!-- 右侧信息 -->
      <div style="flex:1; min-width:0;">
        <div style="font-size:21px; font-weight:700; color:#1a1a1a;">用户名</div>
        <div style="font-size:12px; color:#e74c3c; letter-spacing:2px; margin-top:2px;">同好会成员</div>
        <!-- 签名 -->
        <div style="font-size:12px; color:#5a5a5a; margin-top:8px; border-left:2px solid #e0e0e0; padding-left:10px;">
          "今日也在寻找好看的视觉小说"
        </div>
      </div>
    </div>

    <!-- 所属同好会框 -->
    <div style="margin:0 16px; border-radius:12px; border:1px solid #e0e0e0; overflow:hidden;">
      <div style="background:#f8f8f8; padding:7px 14px; font-size:11px; font-weight:600; color:#5a5a5a; letter-spacing:2px; border-bottom:1px solid #e0e0e0;">
        所属同好会
      </div>
      <div style="padding:8px 12px;">
        <!-- 同好会 1 -->
        <div style="display:flex; align-items:center; gap:10px; padding:8px 0; border-bottom:1px solid #f0f0f0;">
          <div style="width:24px; height:24px; border-radius:6px; background:#e74c3c;"></div>
          <div style="flex:1; min-width:0; font-size:13px; font-weight:600; color:#1a1a1a;">XX大学视觉小说同好会</div>
          <span style="font-size:10px; padding:2px 8px; border-radius:4px; background:#e74c3c; color:white; font-weight:500;">会长</span>
        </div>
        <!-- 同好会 2 -->
        <div style="display:flex; align-items:center; gap:10px; padding:8px 0;">
          <div style="width:24px; height:24px; border-radius:6px; background:#ffcdc9;"></div>
          <div style="flex:1; min-width:0; font-size:13px; font-weight:600; color:#1a1a1a;">Galgame 同好联盟</div>
          <span style="font-size:10px; padding:2px 8px; border-radius:4px; background:#f0f0f0; color:#5a5a5a; font-weight:500;">成员</span>
        </div>
      </div>
    </div>

    <!-- 统计 -->
    <div style="display:grid; grid-template-columns:repeat(4,1fr); gap:8px; padding:16px;">
      <div style="background:#f8f8f8; border-radius:10px; padding:10px 4px; text-align:center;">
        <div style="font-size:18px; font-weight:700; color:#e74c3c;">2</div>
        <div style="font-size:11px; color:#5a5a5a; margin-top:2px;">同好会</div>
      </div>
      <div style="background:#f8f8f8; border-radius:10px; padding:10px 4px; text-align:center;">
        <div style="font-size:18px; font-weight:700; color:#e74c3c;">1</div>
        <div style="font-size:11px; color:#5a5a5a; margin-top:2px;">刊物</div>
      </div>
      <div style="background:#f8f8f8; border-radius:10px; padding:10px 4px; text-align:center;">
        <div style="font-size:18px; font-weight:700; color:#e74c3c;">3</div>
        <div style="font-size:11px; color:#5a5a5a; margin-top:2px;">活动</div>
      </div>
      <div style="background:#f8f8f8; border-radius:10px; padding:10px 4px; text-align:center;">
        <div style="font-size:18px; font-weight:700; color:#e74c3c;">45</div>
        <div style="font-size:11px; color:#5a5a5a; margin-top:2px;">天</div>
      </div>
    </div>

    <!-- 底部 -->
    <div style="padding:10px 20px; background:#f8f8f8; font-size:12px; color:#5a5a5a; display:flex; justify-content:space-between; border-top:1px solid #e0e0e0;">
      <span>2024.03.15 加入</span>
      <span>3天前活跃</span>
    </div>
  </div>
</div>

      <span style="display:inline-block; width:16px; height:16px; border-radius:4px; background:#f8f8f8; border:1px solid #ddd;"></span> --md-surface-container
    </span>
    <span style="display:inline-flex; align-items:center; gap:6px; font-size:12px;">
      <span style="display:inline-block; width:16px; height:16px; border-radius:4px; background:#ffcdc9;"></span> --red-1
    </span>
  </div>
</div>
